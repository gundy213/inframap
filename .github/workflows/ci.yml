name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

permissions:
  contents: read

jobs:
  test:
    name: Run tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install root dependencies
        run: npm ci

      - name: Install and test backend
        run: |
          cd backend
          npm ci
          npm test --silent

      - name: Install and build frontend
        run: |
          cd frontend
          npm ci
          npm run build

  containerize:
    name: Build and optionally push Docker images
    runs-on: ubuntu-latest
    needs: test
    env:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Extract app version
        id: app_version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+([-.].+)?$ ]]; then
            echo "Invalid semantic version in package.json: $VERSION"
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Using app version: $VERSION"

      - name: Login to DockerHub
        if: ${{ env.DOCKERHUB_USERNAME != '' && env.DOCKERHUB_TOKEN != '' }}
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build combined image
        uses: docker/build-push-action@v4
        with:
          context: .
          file: ./frontend/Dockerfile
          push: false
          tags: |
            infra-recommender:${{ steps.app_version.outputs.version }}
            infra-recommender:latest
          load: true

      - name: Tag and push to Docker Hub (if credentials available)
        if: ${{ env.DOCKERHUB_USERNAME != '' && env.DOCKERHUB_TOKEN != '' }}
        run: |
          docker tag infra-recommender:${{ steps.app_version.outputs.version }} ${{ env.DOCKERHUB_USERNAME }}/infra-recommender:latest
          docker tag infra-recommender:${{ steps.app_version.outputs.version }} ${{ env.DOCKERHUB_USERNAME }}/infra-recommender:${{ steps.app_version.outputs.version }}
          docker push ${{ env.DOCKERHUB_USERNAME }}/infra-recommender:latest
          docker push ${{ env.DOCKERHUB_USERNAME }}/infra-recommender:${{ steps.app_version.outputs.version }}

      - name: Save image as artifact
        run: |
          docker save infra-recommender:${{ steps.app_version.outputs.version }} -o infra-recommender.tar

      - name: Upload image as artifact
        uses: actions/upload-artifact@v4
        with:
          name: docker-images
          path: infra-recommender.tar
