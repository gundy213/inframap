name: CI

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]

permissions:
  contents: read

jobs:
  test:
    name: Run tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install root dependencies
        run: npm ci

      - name: Install and test backend
        run: |
          cd backend
          npm ci
          npm test --silent

      - name: Install and build frontend
        run: |
          cd frontend
          npm ci
          npm run build

  containerize:
    name: Build and optionally push Docker images
    runs-on: ubuntu-latest
    needs: test
    env:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Login to DockerHub
        if: ${{ env.DOCKERHUB_USERNAME != '' && env.DOCKERHUB_TOKEN != '' }}
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build backend image
        uses: docker/build-push-action@v4
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: ${{ env.DOCKERHUB_USERNAME != '' && env.DOCKERHUB_TOKEN != '' }}
          tags: |
            ${{ env.DOCKERHUB_USERNAME }}/infra-recommender-backend:latest
            infra-recommender-backend:${{ github.sha }}
          load: true

      - name: Build frontend image
        uses: docker/build-push-action@v4
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: ${{ env.DOCKERHUB_USERNAME != '' && env.DOCKERHUB_TOKEN != '' }}
          tags: |
            ${{ env.DOCKERHUB_USERNAME }}/infra-recommender-frontend:latest
            infra-recommender-frontend:${{ github.sha }}
          load: true

      - name: Save backend image as artifact (no push)
        if: ${{ env.DOCKERHUB_USERNAME == '' || env.DOCKERHUB_TOKEN == '' }}
        run: |
          docker save infra-recommender-backend:${{ github.sha }} -o backend-image.tar || docker save ${{ secrets.DOCKERHUB_USERNAME }}/infra-recommender-backend:latest -o backend-image.tar

      - name: Save frontend image as artifact (no push)
        if: ${{ env.DOCKERHUB_USERNAME == '' || env.DOCKERHUB_TOKEN == '' }}
        run: |
          docker save infra-recommender-frontend:${{ github.sha }} -o frontend-image.tar || docker save ${{ secrets.DOCKERHUB_USERNAME }}/infra-recommender-frontend:latest -o frontend-image.tar

      - name: Upload images as artifacts (when not pushing)
        if: ${{ env.DOCKERHUB_USERNAME == '' || env.DOCKERHUB_TOKEN == '' }}
        uses: actions/upload-artifact@v4
        with:
          name: docker-images
          path: |
            backend-image.tar
            frontend-image.tar
